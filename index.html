<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14110f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Threadbare — A Life</title>
<style>
:root{
  --ink:#f4ede1; --ink-dim:#a89e8c; --ink-faint:#6b6356;
  --bg:#14110f; --panel:#1f1a16; --panel-2:#28221c;
  --line:#3a322a; --gold:#d9a441; --gold-soft:#b88a3a;
  --rose:#c8657a; --sage:#7fa07a; --sky:#6f97b8; --blood:#a8443a;
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
  display:flex; justify-content:center;
  overscroll-behavior:none; -webkit-font-smoothing:antialiased;
}
#app{
  width:100%; max-width:480px; min-height:100%;
  display:flex; flex-direction:column;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  position:relative;
}
.hidden{display:none!important}

/* ---------- top bar ---------- */
header{
  padding:14px 18px 10px; border-bottom:1px solid var(--line);
  position:sticky; top:0; background:linear-gradient(var(--bg),var(--bg) 70%,transparent);
  z-index:20;
}
.namerow{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
.pname{font-size:21px; font-weight:600; letter-spacing:.3px}
.page-flag{font-size:13px; color:var(--gold); font-variant:small-caps; letter-spacing:1px}
.sub{font-size:12.5px; color:var(--ink-dim); margin-top:2px; font-variant:small-caps; letter-spacing:.5px}
.stats{display:grid; grid-template-columns:repeat(2,1fr); gap:7px 14px; margin-top:12px}
.stat{display:flex; align-items:center; gap:8px; font-size:12px}
.stat .lab{width:46px; color:var(--ink-dim); font-variant:small-caps; letter-spacing:.5px}
.bar{flex:1; height:7px; background:#0d0b09; border-radius:6px; overflow:hidden; border:1px solid #2a241e}
.fill{display:block; height:100%; border-radius:6px; transition:width .5s ease}
.money{margin-top:10px; font-size:13px; color:var(--gold); letter-spacing:.3px}
.money b{color:var(--ink); font-weight:600}

/* ---------- log ---------- */
#log{flex:1; overflow-y:auto; padding:16px 18px 8px; scroll-behavior:auto}
.entry{margin-bottom:13px; line-height:1.5; font-size:15px; animation:rise .35s ease}
.season-head{font-variant:small-caps; letter-spacing:2px; color:var(--gold); font-size:13px; text-align:center; margin:2px 0 14px; padding-bottom:8px; border-bottom:1px solid rgba(217,164,65,.18)}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.entry .yr{font-variant:small-caps; color:var(--gold-soft); font-size:12px; letter-spacing:1.5px; display:block; margin-bottom:1px}
.entry.good{color:var(--ink)}
.entry.bad .body{color:#e8b3a8}
.entry.big{border-left:2px solid var(--gold); padding-left:11px}
.entry.death{border-left:2px solid var(--blood); padding-left:11px}
.entry.birth{border-left:2px solid var(--sage); padding-left:11px}
.muted{color:var(--ink-faint); font-style:italic; font-size:14px}

/* ---------- action grid ---------- */
#actions{padding:6px 10px 4px; display:grid; grid-template-columns:repeat(6,1fr); gap:5px}
.act{
  background:var(--panel); border:1px solid var(--line); color:var(--ink);
  border-radius:var(--r); padding:10px 2px 8px; font-family:inherit;
  font-size:10px; display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; transition:transform .08s, background .15s; letter-spacing:.1px;
}
.act:active{transform:scale(.93); background:var(--panel-2)}
.act .ico{font-size:21px; line-height:1}
.act:disabled{opacity:.32}

/* ---------- age button ---------- */
#agewrap{padding:10px 14px calc(14px + env(safe-area-inset-bottom))}
#age{
  width:100%; padding:17px; border:none; border-radius:var(--r);
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  color:#1a1410; font-family:inherit; font-size:18px; font-weight:700;
  letter-spacing:.5px; cursor:pointer; box-shadow:0 6px 22px -8px var(--gold);
  display:flex; align-items:center; justify-content:center; gap:10px;
}
#age:active{transform:scale(.98)}
#age small{font-weight:400; opacity:.7; font-size:13px}

/* ---------- sheet / modal ---------- */
.scrim{
  position:fixed; inset:0; background:rgba(6,5,4,.72); z-index:50;
  display:flex; align-items:flex-end; justify-content:center;
  animation:fade .2s ease;
}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%; max-width:480px; max-height:84vh; overflow-y:auto;
  background:var(--panel); border:1px solid var(--line);
  border-radius:20px 20px 0 0; padding:8px 0 calc(18px + env(safe-area-inset-bottom));
  animation:slideup .26s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.grab{width:38px; height:4px; background:var(--line); border-radius:3px; margin:8px auto 4px}
.sheet h3{padding:8px 20px 4px; font-size:18px; letter-spacing:.3px}
.sheet .hint{padding:0 20px 10px; color:var(--ink-dim); font-size:13px}
.opt{
  display:flex; align-items:center; gap:13px; width:100%; text-align:left;
  background:none; border:none; border-top:1px solid var(--line); color:var(--ink);
  font-family:inherit; font-size:15px; padding:14px 20px; cursor:pointer;
}
.opt:active{background:var(--panel-2)}
.opt .oico{font-size:21px; width:26px; text-align:center}
.opt .otxt{flex:1}
.opt .osub{display:block; font-size:12px; color:var(--ink-dim); margin-top:2px}
.opt .ocost{font-size:12px; color:var(--gold)}
.opt:disabled{opacity:.34}
.opt:disabled .ocost{color:var(--blood)}

/* relationship rows */
.rel{display:flex; align-items:center; gap:12px; padding:13px 20px; border-top:1px solid var(--line)}
.rel .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--panel-2);flex-shrink:0}
.rel .rinfo{flex:1; min-width:0}
.rel .rn{font-size:15px}
.rel .rd{font-size:12px; color:var(--ink-dim)}
.rel .rbar{height:5px;width:60px;background:#0d0b09;border-radius:4px;overflow:hidden;margin-top:4px}
.rel .rbar i{display:block;height:100%}
.rel.dead{opacity:.45}
.rel.dead .rn::after{content:" †"; color:var(--blood)}

/* tree */
#tree{padding:14px 10px 30px; overflow-x:auto}
.gen{display:flex; gap:10px; justify-content:center; margin-bottom:22px; position:relative; flex-wrap:wrap}
.gen-lab{position:absolute; left:0; top:-2px; font-size:10px; color:var(--ink-faint); font-variant:small-caps; letter-spacing:1px}
.node{
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  padding:8px 10px; min-width:74px; text-align:center; font-size:11px;
}
.node.you{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold)}
.node.dead{opacity:.5}
.node .nf{font-size:18px}
.node .nn{margin-top:2px; line-height:1.25}
.node .ny{color:var(--ink-faint); font-size:9.5px; margin-top:2px}

/* generic centered modal */
.cmodal{
  width:calc(100% - 36px); max-width:420px; background:var(--panel);
  border:1px solid var(--line); border-radius:18px; padding:24px 22px;
  margin:auto; animation:pop .25s cubic-bezier(.2,.9,.3,1);
}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
.scrim.center{align-items:center; padding:18px}
.cmodal h2{font-size:24px; margin-bottom:6px; letter-spacing:.3px}
.cmodal p{color:var(--ink-dim); font-size:14px; line-height:1.55; margin-bottom:8px}
.cmodal .big-emoji{font-size:46px; text-align:center; margin-bottom:8px}
.btn{
  width:100%; padding:14px; border:none; border-radius:12px; font-family:inherit;
  font-size:16px; font-weight:600; cursor:pointer; margin-top:10px; letter-spacing:.3px;
}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-soft)); color:#1a1410}
.btn.ghost{background:var(--panel-2); color:var(--ink); border:1px solid var(--line)}
.btn:active{transform:scale(.98)}
input.txt{
  width:100%; padding:13px; background:#0d0b09; border:1px solid var(--line);
  border-radius:10px; color:var(--ink); font-family:inherit; font-size:16px; margin-top:6px;
}
.choosecards{display:flex; flex-direction:column; gap:10px; margin-top:12px}
.ccard{
  background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
  padding:13px 15px; cursor:pointer; text-align:left;
}
.ccard:active{background:var(--panel)}
.ccard b{font-size:15px; display:block; margin-bottom:3px}
.ccard span{font-size:12.5px; color:var(--ink-dim); line-height:1.45}
.toast{
  position:fixed; bottom:calc(96px + env(safe-area-inset-bottom)); left:50%;
  transform:translateX(-50%); background:var(--panel-2); border:1px solid var(--line);
  color:var(--ink); padding:11px 18px; border-radius:30px; font-size:13.5px;
  z-index:80; animation:fade .2s; max-width:90%; text-align:center;
}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

function makeSex(){ const r=Math.random(); return r<.48?'m':r<.96?'f':'n'; }
// pick the sex of a romantic partner based on a person's orientation
function partnerSex(p){
  const o=p.orientation||defaultOrientation(p);
  const same=p.sex, opp=p.sex==='m'?'f':p.sex==='f'?'m':makeSex();
  if(o==='gay') return same;
  if(o==='bi')  return chance(50)?same:opp;
  return opp; // straight
}
function defaultOrientation(p){
  // most are straight; a realistic minority gay/bi. Set lazily if never chosen.
  if(p.orientation) return p.orientation;
  const r=Math.random();
  p.orientation = r<0.85?'straight': r<0.93?'gay':'bi';

function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(G)); }catch(e){} }
function load(){ try{ const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }

    </div>
  </div>`;
  if(saved) $('#cont').onclick=()=>{ G=saved; ensureIdc(); migrate(); render(); root.innerHTML=''; };

}
function ensureIdc(){ if(!G.idc){ let m=0; G.people.forEach(p=>m=Math.max(m,p.id)); G.idc=m; } }
function migrate(){
  // backfill fields added in later versions so old saves keep working
  if(!G.hometown) G.hometown='Unknown';
  if(!G.world) G.world=[];
  if(!G.country) G.country=(G.hometown||'').split(', ')[1]||null;
  G.people.forEach(p=>{
    if(!p.portfolio) p.portfolio={low:0,med:0,high:0};
    if(!p.businesses) p.businesses=[];
    if(!p.assets) p.assets=[];
    if(!p.pets) p.pets=[];
    if(!p.record) p.record=[];
    if(!p.conditions) p.conditions=[];
    if(!p.seeds) p.seeds=[];
    if(!p.flags) p.flags={};
    if(!p.seenEvents) p.seenEvents=[];
    if(!p.clubs) p.clubs=[];
    if(!p.partnerHistory) p.partnerHistory=[];
    if(p.autonomous==null) p.autonomous=false;
    if(p.orientation==null) p.orientation=null;
    if(p.lifeSentence==null) p.lifeSentence=false;
    if(p.citizenship==null) p.citizenship=(G.country||null);
    if(p.ruler==null) p.ruler=null;
    if(p.securityLevel==null) p.securityLevel=0;
    if(p.escapeAttempts==null) p.escapeAttempts=0;
    if(!p.powers) p.powers=[];
    if(p.q==null) p.q=0;
    if(p.stress==null) p.stress=0;
    if(p.socialFollowers==null) p.socialFollowers=0;
    if(p.onSocial==null) p.onSocial=false;
    if(p.insured==null) p.insured=false;
    if(p.inPrison==null) p.inPrison=false;
    if(p.prisonYears==null) p.prisonYears=0;
    if(!p.bday) p.bday={m:rnd(12),day:1+rnd(28)};
  });
}

function startLife(pend,sex){
  const dadLast = pend.ln;
  const dad = {name:newFirst('m')+' '+dadLast, kind:'Father', sex:'m', bond:60+rnd(30), alive:true, id:-1};
  const mom = {name:newFirst('f')+' '+pick(LAST), kind:'Mother', sex:'f', bond:65+rnd(30), alive:true, id:-2};
  const sibCount = rnd(3);
  const sibs=[]; for(let i=0;i<sibCount;i++){ const ss=makeSex(); sibs.push({name:newFirst(ss)+' '+dadLast, kind:ss==='m'?'Brother':ss==='f'?'Sister':'Sibling', sex:ss, bond:40+rnd(40), alive:true, id:-(10+i)}); }

  const [city,country]=pend.place;
  G = { lineage:pend.ln, gen:1, year:1995+rnd(20), idc:1, cur:1, people:[], hometown:`${city}, ${country}`, country, world:[] };
  const p = blankPerson({
    id:1, first:pend.fn, last:pend.ln, sex, gen:1, born:G.year,
    traits:[pend.t1.k,pend.t2.k], money:0, rels:[dad,mom,...sibs], parentIds:[-1,-2]
  });
  p.birthplace=`${city}, ${country}`;
  p.bday=pend.bday;
  p._familyMoney = pend.origin.m;
  G.people.push(p);
  log(`${pend.fn} ${pend.ln} was born on ${MONTHS[pend.bday.m]} ${pend.bday.day} in ${city}, ${country} — ${pend.origin.l}`,'birth');
  log(`${capFirst(pend.t1.l)} and ${pend.t2.l.toLowerCase()} from the very start.`,'muted');
  save(); render(); root.innerHTML='';
}
function capFirst(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function worldEvent(p, text, flags){
  // a deed that marks the world; persists across generations
  if(!G.world) G.world=[];
  G.world.push({year:G.year, by:p.first+' '+p.last, text, flags:flags||{}});
  if(G.world.length>40) G.world=G.world.slice(-40);
  p.stats.fame=clamp(p.stats.fame + (flags&&flags.hope?10:flags&&flags.fear?8:6));
  log('🌍 '+text,'big');
  // some world effects ripple to the player
  if(flags){
    if(flags.fear){ p.stats.happy=clamp(p.stats.happy+4); p.money+=50000+rnd(200000); }
    if(flags.hope){ p.stats.happy=clamp(p.stats.happy+8); }
    if(flags.clones){ p.stats.happy=clamp(p.stats.happy-4); }
  }
}
const SEASONS=['Winter','Spring','Summer','Autumn'];
function log(text,kind='good'){
  const p=me();
  const yr = p? `Age ${p.age}` : '';
  const entry={t:text,k:kind,yr, age:p?p.age:0, q:p?(p.q||0):0, year:G?G.year:0};
  if(p) p.log.push(entry);
  paintLog(entry);
}
function paintLog(entry){
  const div=document.createElement('div');
  div.className='entry '+entry.k;
  if(entry.k==='muted'){ div.innerHTML=`<span class="muted">${entry.t}</span>`; }
  else div.innerHTML=`${entry.yr?`<span class="yr">${entry.yr}</span>`:''}<span class="body">${entry.t}</span>`;
  const L=$('#log'); L.appendChild(div); L.scrollTop=L.scrollHeight;
}
let _logShownFor=null;
function repaintLog(force){
  const p=me(); const L=$('#log');
  // only rebuild the whole log when we switch to a different character (new heir),
  // otherwise live log() appends keep it current and we avoid the scroll-through flicker
  if(!force && _logShownFor===(p&&p.id)) { L.scrollTop=L.scrollHeight; return; }
  _logShownFor = p && p.id;
  L.innerHTML='';
  (p?.log||[]).slice(-80).forEach(paintLog);
  L.scrollTop=L.scrollHeight;
}

function render(){
  const p=me(); if(!p)return;
  $('#h-name').textContent = p.first+' '+p.last;
  $('#h-gen').textContent = 'Gen '+p.gen;
  const c=CAREER(p.job);
  let role = p.inSchool? p.schoolLevel : (p.job!=='none'? c.l : (p.age<6?'A small child':p.age<18?'A student of life':'Between things'));
  $('#h-sub').textContent = `${p.age} yrs · ${sexWord(p.sex)} · ${role}`;
  const st=$('#h-stats'); st.innerHTML='';
  STATMETA.forEach(m=>{
    const v=Math.round(p.stats[m.k]);
    st.insertAdjacentHTML('beforeend',
      `<div class="stat"><span class="lab">${m.l}</span><span class="bar"><i class="fill" style="width:${v}%;background:var(--${m.c.slice(2)})"></i></span></div>`);
  });
  $('#h-money').innerHTML = `Purse <b>${money(p.money)}</b>${p.salary?` · earns ${money(p.salary)}/yr`:''}${p.stats.fame>5?` · ★ ${Math.round(p.stats.fame)} fame`:''}`;

  const lbl=$('#age-label'); if(lbl) lbl.textContent = (p.q||0)===3 ? '＋ End of Year' : '＋ Next Season';
  buildActions();
  repaintLog();
  save();
}

    {ico:'🩺',l:'Health',fn:openHealth},
    {ico:'🧠',l:'Self',fn:openSelf},
    {ico:'🌳',l:'Tree',fn:openTree},
  ];
  acts.forEach(a=>{
    const b=document.createElement('button'); b.className='act';
    b.innerHTML=`<span class="ico">${a.ico}</span><span>${a.l}</span>`;
    b.onclick=a.fn; A.appendChild(b);
  });
}

/* ============================================================
   AGE UP  — the heartbeat
   ============================================================ */
$('#age').onclick=advanceQuarter;

// ============ QUARTERLY HEARTBEAT ============
// Each button press advances one quarter (3 months). The log window clears each
// press so it shows only what happened this quarter. The full yearly simulation
// (jobs, stats, big events, aging) runs on the 4th quarter, then the year ticks.
function advanceQuarter(){
  const p=me(); if(!p||!p.alive) return;
  if(p._busy) return;            // guard against double-press mid-modal
  // clear the visible window for a fresh quarter
  clearWindow();
  const season=SEASONS[p.q||0];
  logSeasonHeader(`${season} · Age ${p.age}`);
  if((p.q||0) < 3){
    // a "light" in-between quarter: minor drift + a chance of its own event/choice
    quarterTick(p, ()=>{ p.q=(p.q||0)+1; render(); });
  } else {
    // 4th quarter → run the full year, then roll over to Q1 and tick age
    p.q=0;
    runYear();   // this advances age/year and may end on a modal; it calls render itself
  }
}
function clearWindow(){
  const L=$('#log'); if(L){ L.innerHTML=''; }
  _logShownFor = me()?me().id:null; // mark as fresh so repaintLog won't rebuild full history
}
function logSeasonHeader(text){
  const L=$('#log'); if(!L) return;
  const div=document.createElement('div'); div.className='season-head';
  div.textContent=text; L.appendChild(div);
}
// a light quarter: small stat drift and a chance of a quarterly event or choice
function quarterTick(p, done){
  // gentle drift so quarters feel alive without double-counting the yearly sim
  p.stats.happy=clamp(p.stats.happy+rndDrift(1));
  // quarterly job flavor for fight-style careers will hook in here later
  // chance of an interactive choice this quarter
  if(p.alive && !p.inPrison && chance(38)){
    const ev=rollInteractiveEvent(p);
    if(ev){ render(); showChoiceEvent(p, ev, ()=>{ if(done)done(); }, {quarter:true}); return; }
  }
  // otherwise a small one-tap quarter event
  if(p.alive && chance(45)){ quarterEvent(p); }
  if(done) done();
}
function ageUp(){ // kept as alias in case anything calls it
  runYear();
}
function runYear(){
  const p=me(); if(!p.alive){ return; }
  p.age++; G.year++;

  // age every other living person in the bloodline (so heirs grow up off-screen)
  G.people.forEach(other=>{
    if(other.id===p.id || !other.alive) return;
    other.age++;
    // light passive development for off-screen kin
    if(other.age<=18){ other.stats.smarts=clamp(other.stats.smarts+0.8); other.stats.athletic=clamp(other.stats.athletic+0.5); }
    else if(other.age>55){ other.stats.health=clamp(other.stats.health-1.0-(other.age-55)*0.1); }
    // give offscreen adults their own unfolding lives — but only close kin, to keep the world bounded
    const closeKin = other.gen>=p.gen && other.gen<=p.gen+1 && isCloseRelative(p,other);
    if(other.age>=18 && closeKin) autonomousLife(other);
    // off-screen natural death for elderly kin (rare, avoids immortal ancestors)
    if(other.age>70 && chance((other.age-70)*0.8)){ other.alive=false; other.deathAge=other.age;
      const rc=p.rels.find(r=>r.id===other.id); if(rc) rc.alive=false;
    }
  });
  pruneTree(p);

  // natural drift
  p.stats.health = clamp(p.stats.health + (p.age>50? -1.2 - (p.age-50)*0.12 : (p.age<25? +0.4:0)) + (p.traits.includes('tough')?0.5:0) + rndDrift());
  p.stats.happy  = clamp(p.stats.happy + rndDrift(2) + (p.traits.includes('kind')?0.3:0));
  if(p.age<=18 && p.inSchool) p.stats.smarts=clamp(p.stats.smarts + (p.traits.includes('curious')?2.2:1.4));
  // high-school club training
  if(p.clubs && p.clubs.length && p.age>=13 && p.age<=18){
    p.clubs.forEach(ck=>{ const cl=CLUBS.find(x=>x.k===ck); if(cl){ p.stats[cl.stat]=clamp(p.stats[cl.stat]+cl.boost); setFlag(p,cl.flag); } });
  }
  if(p.age>=14&&p.age<=22) p.stats.athletic=clamp(p.stats.athletic+rndDrift(2));
  p.stats.looks = clamp(p.stats.looks + (p.age>35?-0.5:p.age<25?0.3:0) + rndDrift(1));
  if(p.stats.fame>0) p.stats.fame=clamp(p.stats.fame*0.94,0,100); // fame fades

  // income
  if(p.job!=='none' && p.alive){
    runJob(p);
  }
  // part-time income
  if(p.partTime){ p.money += p.partTime.pay; p.stress=clamp(p.stress+3); if(p.age<18) p.stats.smarts=clamp(p.stats.smarts-0.5); }

  // schooling transitions
  schoolTick(p);

  // pending delayed consequences from past choices come due
  resolvePending(p);

  // coming of age: discover orientation around 18 (player choice, once)
  if(p.age===18 && !p.orientation && !p._askedOrientation){
    p._askedOrientation=true;
    render();
    showOrientationPicker(p, ()=>{ lifeEvents(p); finishYear(p); });
    return;
  }

  // imprisoned crime boss / supervillain: offer an escape attempt this year
  if(p.inPrison && canAttemptEscape(p) && chance(70)){
    render();
    showEscapeChoice(p, ()=>finishYear(p));
    return;
  }

  // interactive choice event? if one fires, pause the turn and resume after the player chooses
  const ev = rollInteractiveEvent(p);
  if(ev){
    render(); // refresh stats so far
    showChoiceEvent(p, ev, ()=>finishYear(p));
    return;
  }

  // age-banded random (one-tap) events
  lifeEvents(p);

  finishYear(p);
}
function finishYear(p){
  if(!p.alive) return;
  // relationship drift + deaths of kin
  relTick(p);
  // ongoing systems: insurance, assets, pets, prison, stress
  systemsTick(p);
  // health crisis / death roll
  if(deathRoll(p)) { return; } // handles death + continuation
  render();
}
function rndDrift(s=3){ return (Math.random()*2-1)*s*0.6; }

function systemsTick(p){
  // insurance premium
  if(p.insured){ const prem=p.insurePremium||(2200+p.age*40); p.money-=prem; if(p.money<0&&chance(40)){p.insured=false;log(`${p.first} could no longer afford health insurance. Coverage lapsed.`,'bad');} }
  // chronic conditions erode health
  if(p.conditions.length){ p.stats.health=clamp(p.stats.health - p.conditions.length*1.5); }
  // stress bleeds into health
  if(p.stress>60){ p.stats.health=clamp(p.stats.health-(p.stress-60)*0.08); if(chance(6)){p.conditions.push('high blood pressure');log(`Years of stress caught up — ${p.first} was diagnosed with high blood pressure.`,'bad');p.stress=clamp(p.stress-20);} }
  p.stress=clamp(p.stress-3);
  // addiction
  if(p.addiction){ p.stats.health=clamp(p.stats.health-2); p.stats.happy=clamp(p.stats.happy-1); if(chance(7)){p.addiction=null;log(`${p.first} finally beat their ${'addiction'}. Hard-won.`,'big');p.stats.happy=clamp(p.stats.happy+10);} }
  // assets depreciate / appreciate
  p.assets.forEach(a=>{ if(a.kind==='car') a.value=Math.round(a.value*0.88); else if(a.kind==='house') a.value=Math.round(a.value*(1.01+Math.random()*0.06)); });
  // pets age + give comfort (health & happiness)
  let livePets=0;
  p.pets.forEach(pet=>{ if(!pet.alive)return; livePets++; pet.age++; const lifespan=pet.kind==='Dog'?15:pet.kind==='Cat'?18:pet.kind==='Parrot'?40:10;
    if(pet.age>lifespan && chance(35)){ pet.alive=false; livePets--; log(`${pet.name} the ${pet.kind.toLowerCase()} passed away. ${p.first} is heartbroken.`,'death'); p.stats.happy=clamp(p.stats.happy-12); }
    else if(chance(2)){ pet.bond=clamp(pet.bond+3); } });
  if(livePets){ p.stats.happy=clamp(p.stats.happy + Math.min(4,livePets*2)); p.stats.health=clamp(p.stats.health + Math.min(2,livePets)); }
  // prison
  if(p.inPrison){
    p.stats.happy=clamp(p.stats.happy-4); p.stats.health=clamp(p.stats.health-1);
    p._yearsServed=(p._yearsServed||0)+1;
    // appeal / case review — evidence can resurface and overturn a conviction
    if(p._yearsServed>=3 && chance(p.lifeSentence?1.8:4)){
      const kind=pick([
        {t:`A key witness recanted their testimony.`, win:55},
        {t:`${p.first}'s lawyer found evidence was mishandled.`, win:50},
        {t:`New DNA evidence came to light.`, win:60},
        {t:`A detective on the case was exposed for misconduct.`, win:65},
        {t:`An appeals court agreed to review the case.`, win:40},
      ]);
      log(kind.t+` An appeal is underway.`,'big');
      if(chance(kind.win)){
        p.inPrison=false; p.prisonYears=0; p.lifeSentence=false;
        p.record.push('Conviction overturned');
        p.stats.happy=clamp(p.stats.happy+20);
        log(`${p.first}'s conviction was overturned. A free ${sexWord(p.sex)} again.`,'big');
        return;
      } else {
        log(`The appeal was denied. ${p.first} stays inside.`,'bad');
      }
    }
    // parole for non-life sentences
    if(!p.lifeSentence){
      p.prisonYears--;
      // chance of early parole for good behavior
      if(p.prisonYears>1 && p._yearsServed>=2 && chance(12)){ p.prisonYears=0; log(`${p.first} was granted early parole for good behavior.`,'good'); }
      if(p.prisonYears<=0){ p.inPrison=false; p._yearsServed=0; p._wasCrime=false; p._villainJailed=false; p.securityLevel=0; p.escapeAttempts=0; log(`${p.first} was released from prison. A second chance.`,'big'); }
    }
  }

  // investment portfolio — different risk/return profiles
  if(p.portfolio){
    const tiers=[['low',0.04,0.04],['med',0.08,0.16],['high',0.16,0.45]];
    let totalDelta=0;
    tiers.forEach(([k,meanR,vol])=>{
      if(p.portfolio[k]>0){
        const r = meanR + (Math.random()*2-1)*vol;
        const delta=Math.round(p.portfolio[k]*r);
        p.portfolio[k]=Math.max(0,p.portfolio[k]+delta);
        totalDelta+=delta;
      }
    });
    if(Math.abs(totalDelta)>500){ log(totalDelta>=0?`Investments grew by ${money(totalDelta)} this year.`:`Investments fell ${money(-totalDelta)} this year.`, totalDelta>=0?'good':'bad'); }
  }
  // business income (casino, etc.)
  if(p.businesses && p.businesses.length){
    p.businesses.forEach(b=>{
      const swing=0.5+Math.random();
      const profit=Math.round(b.income*swing);
      p.money+=profit;
      b.value=Math.round(b.value*(1.0+(Math.random()*0.1-0.03)));
      if(chance(4)){ const hit=Math.round(b.value*0.2); p.money-=hit; log(`${b.name} had a rough year — ${money(hit)} in losses.`,'bad'); }
    });
  }
  // social media growth
  if(p.onSocial){
    const growth=Math.round(p.socialFollowers*0.12) + rnd(500) + (p.stats.fame>20?rnd(3000):0) + (p.traits.includes('charming')?rnd(800):0);
    p.socialFollowers+=growth;
    p.stats.fame=clamp(p.stats.fame + Math.min(3, p.socialFollowers/50000));
    if(p.socialFollowers>50000 && chance(20)){ const sponsor=Math.round(p.socialFollowers*(0.5+Math.random())); p.money+=sponsor; log(`A brand deal landed ${p.first} ${money(sponsor)} from their following.`,'good'); }
  }
}

/* ============================================================
   AUTONOMY — offscreen relatives live their own quiet lives:
   they get jobs, partner up, have kids, build a little wealth.
   Kept lightweight (no logging) but produces real, inheritable people.
   ============================================================ */
function autonomousLife(o){
  o.autonomous=true;
  // pick up a job in their 20s, scaled to their smarts
  if(o.job==='none' && o.age>=20 && o.age<=55 && chance(28)){
    const pool=CAREERS.filter(c=>c.k!=='none'&&!c.wild&&!c.staged&&!c.athGate&&!c.looksGate&&(c.edu||0)<= (o.smartsEdu||(o.stats.smarts>70?3:o.stats.smarts>55?2:o.stats.smarts>40?1:0)));
    if(pool.length){ const j=pick(pool); o.job=j.k; o.salary=j.base; o.jobYears=0; }
  }
  // earn / spend
  if(o.job!=='none'){
    const c=CAREER(o.job); o.jobYears=(o.jobYears||0)+1;
    o.salary=Math.round((c.base||30000)+(o.jobYears*(c.grow||1000)));
    const costs=12000+(o.married?7000:0)+o.childrenIds.length*9000;
    o.money=(o.money||0)+(o.salary-costs);
    // occasional retirement
    if(o.age>64 && chance(30)){ o.job='none'; o.salary=0; }
  }
  // partner up
  if(!o.married && o.age>=22 && o.age<=60 && chance(14)){
    const sx=makeSex();
    const sp={name:newFirst(sx)+' '+pick(LAST),kind:'Spouse',sex:sx,bond:55+rnd(30),alive:true,id:nid()};
    o.rels.push(sp); o.married=true; o.partnerName=sp.name;
    if(!o.partnerHistory) o.partnerHistory=[];
    o.partnerHistory.push({id:sp.id,name:sp.name,sex:sx,from:G.year,to:null,status:'Spouse',kids:0});
  }
  // have kids (these become real people in the tree, inheritable)
  if(o.married && o.age>=22 && o.age<=46 && o.childrenIds.length<4 && chance(20)){
    const csx=makeSex();
    const kid=blankPerson({first:newFirst(csx),last:o.last,sex:csx,gen:o.gen+1,born:G.year,age:0,parentIds:[o.id]});
    kid.stats.smarts=clamp((o.stats.smarts+(50+rnd(30)))/2);
    if(o.traits.length) kid.traits=[pick(o.traits),pick(TRAITS).k].filter((v,i,a)=>a.indexOf(v)===i);
    G.people.push(kid);
    o.childrenIds.push(kid.id);
    o.rels.push({name:kid.first+' '+kid.last,kind:'Child',sex:csx,bond:80,alive:true,id:kid.id});
    const h=(o.partnerHistory||[]).find(x=>x.status==='Spouse'&&!x.to); if(h)h.kids=(h.kids||0)+1;
  }
  // small chance of divorce/widowhood offscreen
  if(o.married && chance(2)){
    const sp=o.rels.find(r=>r.kind==='Spouse'&&r.alive);
    if(sp){ sp.kind='Ex-spouse'; o.married=false; const h=(o.partnerHistory||[]).find(x=>x.id===sp.id); if(h){h.status='Ex-spouse';h.to=G.year;} }
  }
}

function runJob(p){
  const c=CAREER(p.job);
  p.jobYears++;
  let pay=p.salary;

  // ---- deep staged careers (WWE, movie star, tech, boxer, director) ----
  if(c.staged){
    const stages=c.stages;
    if(p._stage==null){ p._stage=0; p._stageYears=0; p.jobTitle=stages[0].t; }
    p._stageYears++;
    const st=stages[p._stage];

    // ----- ORGANIZED CRIME / VILLAIN: bust risk, advancement by years, prison on capture -----
    if(c.crime){
      // pay scales with stage; villains (base 0) earn through heists scaled to their stage
      const heistBase = c.base>0 ? c.base : 40000;
      pay=Math.round(heistBase*Math.max(0.4,st.mult)*(0.8+Math.random()*0.5));
      p.salary=pay;
      // villain world-events: persistent mark on the world
      if(c.evil && p._stage>=2 && chance(20)){ worldEvent(p, pick([
        `${p.first} held a city hostage with a doomsday device.`,
        `${p.first}'s heist drained the national reserve.`,
        `${p.first} unleashed chaos across the capital.`]), {fear:true}); }
      // bust chance this year, reduced by sly trait, raised by stage
      let bust=st.bust + (p.traits.includes('sly')?-4:0) - (p.traits.includes('lucky')?3:0);
      if(c.evil) bust=Math.round(bust*0.55); // costumed villains evade capture more easily
      bust=Math.max(2,bust);
      if(chance(bust)){
        // caught — sentence scales with how deep they were
        const tier=p._stage;
        let sentence;
        if(tier>=4 && chance(40)){ sentence='life'; }
        else sentence = 2 + tier*2 + rnd(4);
        p.record.push(`Convicted (${st.t})`);
        p._wasCrime=true; p._villainJailed=!!c.evil; p.securityLevel=0; p.escapeAttempts=0;
        if(sentence==='life'){
          p.inPrison=true; p.prisonYears=999; p.lifeSentence=true;
          log(`${p.first} was caught and sentenced to LIFE in prison.`,'death');
        } else {
          p.inPrison=true; p.prisonYears=sentence; p.lifeSentence=false;
          log(`${p.first} got pinched — ${sentence} years in prison.`,'bad');
        }
        // seize a chunk of money
        p.money=Math.floor(p.money*0.5);
        endJob(p);
        // costs still apply this year
        p.money -= 11000 + (p.married?7000:0) + p.childrenIds.length*9000;
        return;
      }
      // advancement: by years served in the life + a little luck
      const next=stages[p._stage+1];
      if(next && p._stageYears>=next.years && chance(40+(p.traits.includes('sly')?15:0)+(p.traits.includes('driven')?10:0))){
        p._stage++; p._stageYears=0; p.jobTitle=next.t;
        log(`${p.first} moved up in the organization — now ${next.t}. The money's bigger, the heat's worse.`,'big');
      }
      const costs0 = 11000 + (p.married?7000:0) + p.childrenIds.length*9000 + p.age*120;
      p.money += pay - costs0;
      return;
    }

    const key=c.keyStat||'smarts';
    // training: working the craft slowly raises the key stat
    p.stats[key]=clamp(p.stats[key] + (p.traits.includes('driven')?1.6:1.0) + (chance(30)?1:0));
    // fame trickle by stage
    if(st.fame) p.stats.fame=clamp(p.stats.fame + st.fame*0.2 + (chance(25)?st.fame*0.1:0));
    // SUPERHERO: fight crime (take damage), earn from endorsements at higher stages, do heroic world-events
    if(c.hero){
      if(chance(p._stage>=2?40:25)){ p.stats.health=clamp(p.stats.health-(6+rnd(14))); log(`${p.first} was hurt stopping a crime in progress.`,'bad'); }
      if(p._stage>=2 && chance(18)){ worldEvent(p, pick([
        `${p.first} saved the city from a catastrophe.`,
        `${p.first} foiled a supervillain's scheme.`,
        `${p.first} pulled hundreds from a collapsing bridge.`]), {hope:true}); }
    }
    // MAD SCIENTIST: reality-bending experiments with persistent world consequences
    if(c.mad && p._stage>=2 && chance(22)){
      const exp=pick([
        {t:`${p.first} opened a portal to another dimension.`, w:{portal:true}},
        {t:`${p.first} cloned themselves — there are two now.`, w:{clones:true}},
        {t:`${p.first} reversed gravity over a small town for a week.`, w:{gravity:true}},
        {t:`${p.first} invented a serum that turned pigeons sentient.`, w:{pigeons:true}},
        {t:`${p.first} accidentally aged every clock on Earth by a year.`, w:{clocks:true}},
      ]);
      worldEvent(p, exp.t, exp.w);
      if(chance(25)){ p.stats.health=clamp(p.stats.health-15); log(`The experiment backfired on ${p.first}.`,'bad'); }
    }
    // dangerous staged careers (boxer) take damage
    if(c.danger && !c.hero && chance(p._stage>=2?22:12)){ p.stats.health=clamp(p.stats.health-(8+rnd(12))); log(`${p.first} took a beating this season. Recovery will take time.`,'bad'); }
    // pay = base * stage multiplier, with a little variance
    pay=Math.round(c.base*st.mult*(0.85+Math.random()*0.4));
    p.salary=pay;
    // can we advance to the next stage?
    const next=stages[p._stage+1];
    if(next){
      const ready = p._stageYears>=next.years && p.stats[key]>=next.req;
      if(ready && chance(55+p.stats[key]*0.3)){
        p._stage++; p._stageYears=0; p.jobTitle=next.t;
        p.stats.fame=clamp(p.stats.fame + (next.fame||0));
        const callup = pick(['got the call-up','earned the promotion','broke through','made the leap','signed the bigger deal']);
        log(`${p.first} ${callup} — now ${next.t}. Pay is ${money(Math.round(c.base*next.mult))}.`,'big');
        // heroes & villains unlock a new power as they rise
        if((c.hero||c.evil) && chance(70)){ const pow=grantPower(p); if(pow) log(`${p.first} unlocked a new power: ${pow}.`,'big'); }
      } else if(p._stageYears>10 && p._stage<2 && chance(18)){
        // stuck at the bottom too long → wash out
        log(`${p.first} couldn't break through and left the ${c.l.toLowerCase()} world behind.`,'muted');
        endJob(p); return;
      }
    } else {
      // at the top: aging out for athletic careers
      if((c.short) && p.age>40 && chance(35)){ log(`${p.first} retired at the top of the game — a true legend.`,'big'); p.stats.fame=clamp(p.stats.fame+12); endJob(p,'Retired a champion'); return; }
    }
    // living costs
    const costs0 = 11000 + (p.married?7000:0) + p.childrenIds.length*9000 + p.age*120;
    p.money += pay - costs0;
    if(p.money<0 && chance(30)) log(`Money is tight. ${p.first} is in the red.`,'bad');
    return;
  }

  // wildcard careers fluctuate
  if(c.wild){
    if(c.k==='youtuber'||c.k==='musician'||c.k==='actor'){
      const buzz = (p.stats.fame/40) + (p.traits.includes('charming')?.3:0);
      pay = Math.round(c.base + p.jobYears*c.grow*(0.4+Math.random()*buzz));
      p.stats.fame=clamp(p.stats.fame + (chance(35)? 4+rnd(12):(-2+rnd(3))));
      if(chance(8)){ p.stats.fame=clamp(p.stats.fame+25); log(`Something ${p.first} made ${pick(['went viral','blew up overnight','got picked up everywhere'])}. ★ Fame surged.`,'big'); pay*=3; }
    } else if(c.k==='nba'||c.k==='soccer'){
      pay = c.base + p.jobYears*c.grow;
      const retireAge = c.k==='nba'?34:33;
      if(p.age>retireAge && chance(40)){ log(`The body gave out. ${p.first} retired from the game — a legend's run.`,'big'); p.stats.fame=clamp(p.stats.fame+10); endJob(p,'Retired from pro sports'); return; }
    } else if(c.k==='founder'){
      // startup: mostly nothing, sometimes everything
      if(chance(7)){ const exit=200000+rnd(4000000); p.money+=exit; log(`The company sold. ${p.first} cashed out for ${money(exit)}.`,'big'); p.stats.fame=clamp(p.stats.fame+15); }
      else if(chance(20)){ const raise=rnd(80000); p.money+=raise; if(raise>0)log(`Closed a small round. ${money(raise)} in the bank — for now.`,'good'); }
      else { p.money-=Math.min(p.money,4000+rnd(9000)); }
      pay=0;
    } else if(c.k==='realtor'){
      const sales = rnd(4)+(p.traits.includes('charming')?1:0);
      pay = c.base + sales*c.grow*(0.5+Math.random());
    } else if(c.k==='writer'){
      pay = c.base;
      if(chance(10)){ const royalties=20000+rnd(300000); pay+=royalties; p.stats.fame=clamp(p.stats.fame+12); log(`${p.first}'s book found readers. ${money(royalties)} in royalties.`,'big'); }
    } else if(c.k==='model'){
      const buzz=p.stats.looks/50;
      pay=Math.round(c.base+p.jobYears*c.grow*(0.4+Math.random()*buzz));
      p.stats.fame=clamp(p.stats.fame+(chance(30)?6:1));
    } else if(c.k==='ufc'){
      pay = c.base + p.jobYears*c.grow;
      const won = chance(40 + p.stats.athletic*0.4);
      if(won){ pay+=80000+rnd(400000); p.stats.fame=clamp(p.stats.fame+8); log(`${p.first} won the fight. The crowd went wild.`,'big'); }
      else { p.stats.health=clamp(p.stats.health-12); log(`${p.first} took a brutal loss in the cage.`,'bad'); }
      if(p.age>38 && chance(45)){ log(`${p.first} hung up the gloves for good.`,'big'); endJob(p,'Retired from fighting'); return; }
    } else if(c.k==='politician'){
      pay = c.base + (p._rung??0)*c.grow;
      const steps=c.ladder, idx=p._rung??0;
      if(!p.jobTitle) p.jobTitle=steps[idx];
      if(idx<steps.length-1){
        if(p.jobYears>=2+idx && chance(28 + p.stats.looks*0.15 + p.stats.fame*0.2 + (p.traits.includes('charming')?12:0))){
          // campaign costs money
          if(p.money>20000){ p.money-=15000+rnd(40000);
            p._rung=idx+1; p.jobTitle=steps[p._rung]; p.stats.fame=clamp(p.stats.fame+12);
            log(`${p.first} won the election — now ${p.jobTitle}.`,'big');
          }
        } else if(chance(15)){ p.stats.fame=clamp(p.stats.fame-5); log(`${p.first} lost an election. The press was unkind.`,'bad'); }
      }
    }
    p.salary=pay;
  } else {
    pay = c.base + p.jobYears*c.grow;
    p.stress=clamp(p.stress + rnd(4) - 1);
    // promotion through a ladder
    if(c.ladder){
      const steps=c.ladder, idx=p._rung??0;
      if(idx<steps.length-1 && p.jobYears>=3+idx*2 && chance(35+p.stats.smarts*0.2)){
        p._rung=idx+1; p.jobTitle=steps[p._rung];
        p.salary=pay=Math.round(pay*(1.25+Math.random()*0.3));
        log(`${p.first} was promoted to ${p.jobTitle}. Pay is now ${money(pay)}.`,'big');
      } else if(!p.jobTitle){ p.jobTitle=steps[idx]; }
    }
    // ordinary raise
    if(chance(14)){ pay=Math.round(pay*(1.05+Math.random()*0.06)); p.salary=pay; log(`${p.first} earned a raise. Pay is now ${money(pay)}.`,'good'); }
    // dangerous jobs
    if(c.danger && chance(4)){ p.stats.health=clamp(p.stats.health-25); log(`${p.first} was wounded in the line of duty.`,'bad'); }
  }
  // living costs scale a little with age/family
  const costs = 11000 + (p.married?7000:0) + p.childrenIds.length*9000 + p.age*120;
  const net = pay - costs;
  p.money += net;
  if(p.money<0 && chance(30)) log(`Money is tight. ${p.first} is in the red.`,'bad');
}
function endJob(p,reason){ p.job='none'; p.salary=0; p.jobYears=0; p.jobTitle=null; p._rung=0; p._stage=null; p._stageYears=0; if(reason)log(reason,'muted'); }

/* ---------------- schooling ---------------- */
function schoolTick(p){
  if(p.age===6 && !p.inSchool){ p.inSchool=true; p.schoolLevel='Primary school'; log(`${p.first} started school.`,'muted'); }
  if(p.age===14){ p.schoolLevel='High school'; }
  if(p.age===18 && p.inSchool){ p.inSchool=false; p.schoolLevel=null;
    if(p.stats.smarts>=55) log(`${p.first} graduated high school with real promise.`,'good');
    else log(`${p.first} finished high school.`,'muted');
  }
  // college runs while flag set
  if(p._college){
    p._college--;
    if(p._college===0){ p.inSchool=false; p.schoolLevel=null; p.edu=Math.max(p.edu,p._collegeTier);
      log(`${p.first} graduated — ${EDU[p.edu]}. The doors are open now.`,'big'); p._collegeTier=null; }
  }
}

   INTERACTIVE CHOICE EVENTS
   A choice event = { id, emoji, title, body(p), when(p)->bool,
     weight, once, choices:[ {label, sub?, need?(p), effect(p)} ] }

// --- effect helpers usable inside choices ---
function fx(p, o){ // apply a bundle of stat/money changes, return summary
  if(o.health!=null) p.stats.health=clamp(p.stats.health+o.health);
  if(o.happy!=null)  p.stats.happy =clamp(p.stats.happy +o.happy);
  if(o.smarts!=null) p.stats.smarts=clamp(p.stats.smarts+o.smarts);
  if(o.looks!=null)  p.stats.looks =clamp(p.stats.looks +o.looks);
  if(o.athletic!=null)p.stats.athletic=clamp(p.stats.athletic+o.athletic);
  if(o.fame!=null)   p.stats.fame  =clamp(p.stats.fame  +o.fame);
  if(o.stress!=null) p.stress=clamp(p.stress+o.stress);
  if(o.money!=null)  p.money += o.money;
}
function seed(p, dueInYears, kind, data){ p.seeds.push({dueAge:p.age+dueInYears, kind, data:data||{}}); }
function setFlag(p,k,v=true){ p.flags[k]=v; }
function hasFlag(p,k){ return !!p.flags[k]; }
function addFriend(p, kind='Friend'){ const sx=makeSex(); const f={name:newFirst(sx)+' '+pick(LAST),kind,sex:sx,bond:45+rnd(30),alive:true,id:nid()}; p.rels.push(f); return f; }
function bestFriend(p){ const fs=p.rels.filter(r=>r.kind==='Friend'&&r.alive); return fs.length?fs.sort((a,b)=>b.bond-a.bond)[0]:null; }

function takeJobSilent(p,k){ const c=CAREER(k); p.job=k; p.jobYears=0; p.salary=c.base; p._stage=0; p._stageYears=0; p.jobTitle=c.stages?c.stages[0].t:null; if((c.hero||c.evil)){ const pow=grantPower(p); if(pow) log(`${p.first} discovered a power: ${pow}.`,'big'); } }

function eventEligible(p, ev){
  if(ev.once && p.seenEvents.includes(ev.id)) return false;
  try{ return ev.when(p); }catch(e){ return false; }
}
function rollInteractiveEvent(p){
  if(!p.alive || p.inPrison) return null;
  // ~32% of years offer a decision, scaled down a touch in childhood
  const base = p.age<6? 0 : 30;
  if(!chance(base)) return null;
  const pool = CHOICE_EVENTS.filter(ev=>eventEligible(p,ev));
  if(!pool.length) return null;
  // weighted pick
  let total=pool.reduce((s,e)=>s+(e.weight||1),0), r=Math.random()*total;
  for(const ev of pool){ r-=(ev.weight||1); if(r<=0) return ev; }
  return pool[0];
}
// ----- crime-boss / supervillain escape & security escalation -----
const SECURITY_NAMES=['County Jail','Maximum Security','the Vault (super-prison)'];
function canAttemptEscape(p){
  // only organized crime & supervillains get the underworld-escape treatment
  const isBoss = p.record && p.record.length && (p._wasCrime || p.job==='crimelord' || p.job==='villain');
  const wasBoss = p._wasCrime; // set when they were jailed from a crime career
  if(!(isBoss||wasBoss)) return false;
  if(p.securityLevel>=2) return chance(30); // the Vault: escape is very hard but villains can still try
  return true;
}
function showEscapeChoice(p, done){
  const lvl=p.securityLevel||0;
  const villain = p._villainJailed;
  const sec=SECURITY_NAMES[lvl];
  const opts=[];
  // option set depends on security level and whether they have powers
  if(lvl<2){
    opts.push({l:'Bribe a guard', sub:`$${(50000*(lvl+1)).toLocaleString()} · risky`, kind:'bribe'});
    opts.push({l:villain?'Break out with brute force':'Stage a prison break', sub:'violent, can fail hard', kind:'force'});
  } else {
    opts.push({l:'Attempt the impossible escape', sub:'the Vault has never been beaten… almost', kind:'vault'});
  }
  if(p.powers && p.powers.length){
    opts.push({l:`Use your powers (${p.powers[0]})`, sub:'best odds, escalates security', kind:'powers'});
  }
  opts.push({l:'Serve your time', sub:'wait it out', kind:'wait'});

  let html=`<div class="grab"></div>
    <div style="text-align:center;font-size:40px;margin:4px 0">⛓️</div>
    <h3 style="text-align:center">Locked up — ${sec}</h3>
    <p style="padding:4px 22px 14px;color:var(--ink-dim);font-size:14.5px;line-height:1.55;text-align:center">${p.first} is behind bars${p.lifeSentence?' for life':''}. The right move could mean freedom — or a transfer somewhere far worse.</p>`;
  opts.forEach((c,i)=>{ html+=`<button class="opt" data-i="${i}"><span class="oico">▸</span><span class="otxt">${c.l}<span class="osub">${c.sub}</span></span></button>`; });
  const s=document.createElement('div'); s.className='scrim'; s.innerHTML=`<div class="sheet">${html}</div>`; root.appendChild(s);
  s.querySelectorAll('.opt').forEach(b=>{ b.onclick=()=>{ const c=opts[+b.dataset.i]; s.remove(); resolveEscape(p,c.kind); done(); }; });
}
function escapeFree(p, how){
  p.inPrison=false; p.prisonYears=0; p.lifeSentence=false; p._yearsServed=0;
  p.securityLevel=0; p.escapeAttempts=0; p._villainJailed=false;
  p.record.push('Escaped custody');
  p.stats.happy=clamp(p.stats.happy+18); p.stats.fame=clamp(p.stats.fame+10);
  log(`${how} ${p.first} is FREE. A fugitive now, but free.`,'big');
}
function escapeFail(p, how){
  p.escapeAttempts=(p.escapeAttempts||0)+1;
  // escalate security on failure
  if(p.securityLevel<2){ p.securityLevel++; log(`${how} ${p.first} was caught and transferred to ${SECURITY_NAMES[p.securityLevel]}. Escape just got harder.`,'bad'); }
  else { log(`${how} The attempt failed. There is no escaping the Vault.`,'bad'); }
  if(!p.lifeSentence) p.prisonYears+=2+rnd(3); // added time
  p.stats.health=clamp(p.stats.health-6);
}
function resolveEscape(p, kind){
  if(kind==='wait'){ log(`${p.first} kept their head down and served the time.`,'muted'); return; }
  const sly = p.traits.includes('sly')?10:0, lucky=p.traits.includes('lucky')?8:0;
  const lifePenalty = p.lifeSentence?18:0; // hardest crimes are harder to walk away from
  if(kind==='bribe'){
    const cost=50000*((p.securityLevel||0)+1);
    if(p.money<cost){ log(`${p.first} couldn't raise the ${money(cost)} bribe.`,'muted'); return; }
    p.money-=cost;
    if(chance(45+sly+lucky-lifePenalty)) escapeFree(p,'The bribe worked.'); else escapeFail(p,'The guard took the money and ratted.');
  } else if(kind==='force'){
    if(chance(30+sly+lucky+(p.stats.athletic*0.2)-lifePenalty)) escapeFree(p,'A bloody breakout.'); else escapeFail(p,'The breakout was crushed.');
  } else if(kind==='powers'){
    if(chance(60+lucky-lifePenalty)) escapeFree(p,'Your powers tore the cell apart.'); else escapeFail(p,'Even your powers weren\'t enough this time.');
  } else if(kind==='vault'){
    if(chance(10+lucky+(p.powers.length?18:0))) escapeFree(p,'Against all odds, the Vault was beaten.'); else escapeFail(p,'The Vault held.');
  }
}

function showChoiceEvent(p, ev, done, opts){

      <span class="oico">▸</span>
      <span class="otxt">${c.label}${c.sub?`<span class="osub">${c.sub}</span>`:''}</span></button>`;
  });

      s.remove();

      if(msg) log(msg, 'big');

      if(next){ render(); showChoiceEvent(p, next, done, {chained:true}); return; }

      render();
      if(done) done();
    };
  });
}

// delayed consequences come due
function resolvePending(p){
  if(!p.seeds || !p.seeds.length) return;
  const due = p.seeds.filter(s=>s.dueAge<=p.age);
  p.seeds = p.seeds.filter(s=>s.dueAge>p.age);
  due.forEach(s=>{
    switch(s.kind){
      case 'startup_payoff':
        if(hasFlag(p,'tookRisk')){ const win=chance(45); if(win){ const v=80000+rnd(900000); p.money+=v; p.stats.fame=clamp(p.stats.fame+10); log(`The bet ${p.first} made years ago paid off — ${money(v)}.`,'big'); } else { log(`That startup ${p.first} joined years ago quietly folded. Lesson learned.`,'bad'); } }
        break;
      case 'loan_repay':{
        const amt=s.data.amt||5000;
        if(chance(70)){ p.money+=Math.round(amt*1.1); log(`An old friend repaid ${p.first}'s loan, with interest.`,'good'); }
        else log(`The friend ${p.first} lent money to vanished. The loan's gone.`,'bad');
        break;}
      case 'grounded': log(`${p.first}'s grounding finally ended.`,'muted'); break;
      case 'tough_skin': case 'thick_skin': case 'tough_skin8':
        p.stats.happy=clamp(p.stats.happy+4); log(`The hard times ${p.first} went through left them more resilient.`,'muted'); break;
      case 'affair_fallout':
        if(hasFlag(p,'secretAffair') && chance(45)){ const sp=p.rels.find(r=>r.kind==='Spouse'&&r.alive); if(sp)sp.bond=clamp(sp.bond-30); p.stats.happy=clamp(p.stats.happy-12); log(`${p.first}'s old secret finally surfaced. The fallout is real.`,'bad'); }
        break;
      case 'retaliation':
        if(chance(50)){ p.stats.health=clamp(p.stats.health-15); log(`${p.first} faced retaliation for testifying. A frightening year.`,'bad'); }
        break;
    }
  });
}

   DEATH + CONTINUATION
   ============================================================ */
function deathRoll(p){
  let risk = 0.2;
  if(p.age>55) risk += (p.age-55)*0.45;
  if(p.age>80) risk += (p.age-80)*1.4;
  risk += (60 - p.stats.health)*0.06;
  if(p.traits.includes('tough')) risk*=0.8;
  if(p.traits.includes('lucky')) risk*=0.7;
  if(p.stats.health<=0) risk=100;
  if(chance(clamp(risk,0,100))){
    die(p); return true;
  }
  return false;
}
function die(p){
  p.alive=false; p.deathAge=p.age;
  // liquidate assets into the estate
  const assetVal = p.assets.reduce((s,a)=>s+a.value,0);
  const portVal = p.portfolio? (p.portfolio.low+p.portfolio.med+p.portfolio.high):0;
  const bizVal = (p.businesses||[]).reduce((s,b)=>s+b.value,0);
  p.estate = Math.max(0, p.money + assetVal + portVal + bizVal);
  const cause = p.inPrison ? 'died behind bars'
    : p.stats.health<=0 ? 'failing health'
    : p.age>78 ? pick(['old age','a peaceful sleep','a long life well-lived'])
    : pick(['an accident','a sudden illness','a heart that simply stopped','bad luck on an ordinary day']);
  p.deathCause=cause;
  log(`${p.first} ${p.last} died at ${p.age}, of ${cause}.`,'death');
  const legacy = p.stats.fame>40?'Remembered far and wide.':p.childrenIds.length?'Survived by family.':p.pets.filter(x=>x.alive).length?'Survived only by a loyal pet.':'Mourned by few, missed by some.';
  log(legacy,'muted');
  G.cur=null;
  setTimeout(()=>deathScreen(p),700);
}

function isCloseRelative(p, other){
  // the player's own children, and the children of those children (grandchildren)
  if(p.childrenIds.includes(other.id)) return true;
  for(const cid of p.childrenIds){ const c=findP(G,cid); if(c && (c.childrenIds||[]).includes(other.id)) return true; }
  return false;
}
function pruneTree(p){
  // keep the tree from ballooning: cap total people, dropping the least-relevant dead ones first.
  const CAP=140;
  if(G.people.length<=CAP) return;
  // never remove: the player, anyone alive, the player's direct children & grandchildren,
  // or the player's ancestral line (parents chain via parentIds isn't stored as people, so just protect by gen<=player)
  const protectedIds=new Set([p.id]);
  p.childrenIds.forEach(id=>{ protectedIds.add(id); const c=findP(G,id); if(c)(c.childrenIds||[]).forEach(g=>protectedIds.add(g)); });
  // candidates to remove: dead, not protected, older generations far from the player
  const removable=G.people.filter(x=>!x.alive && !protectedIds.has(x.id))
    .sort((a,b)=> (a.gen-b.gen) || ((a.deathAge||0)-(b.deathAge||0)) ); // oldest gens first
  let toRemove=G.people.length-CAP;
  const removeIds=new Set();
  for(const x of removable){ if(toRemove<=0)break; removeIds.add(x.id); toRemove--; }
  if(removeIds.size){
    G.people = G.people.filter(x=>!removeIds.has(x.id));
    // clean up dangling child references
    G.people.forEach(x=>{ if(x.childrenIds) x.childrenIds=x.childrenIds.filter(id=>!removeIds.has(id)); });
  }
}
function heirsOf(p){
  // direct children first
  const kids = p.childrenIds.map(id=>findP(G,id)).filter(k=>k&&k.alive);
  if(kids.length) return kids;
  // then grandchildren (children of the deceased's children)
  let grandkids=[];
  p.childrenIds.map(id=>findP(G,id)).filter(Boolean).forEach(child=>{
    (child.childrenIds||[]).map(gid=>findP(G,gid)).filter(g=>g&&g.alive).forEach(g=>grandkids.push(g));
  });
  if(grandkids.length) return grandkids;
  // finally, any living descendant in a later generation (nieces, cousins down the line)
  const descendants = G.people.filter(x=>x.alive && x.gen>p.gen && x.id!==p.id);
  return descendants.slice(0,6);
}
function deathScreen(deceased){
  const heirs = heirsOf(deceased);
  const estate = deceased.estate ?? deceased.money;
  root.innerHTML=`
  <div class="scrim center">
    <div class="cmodal" style="text-align:center">
      <div class="big-emoji">🕯</div>
      <h2>${deceased.first} ${deceased.last}</h2>
      <p>${deceased.born}–${G.year} · lived ${deceased.deathAge} years</p>
      <p style="color:var(--ink-dim);font-size:13px">${EDU[deceased.edu]}${deceased.job!=='none'?' · '+CAREER(deceased.job).l:''} · ${deceased.childrenIds.length} child${deceased.childrenIds.length===1?'':'ren'}${deceased.record.length?' · had a record':''}</p>
      <p style="color:var(--gold)">Estate worth ${money(estate)}${heirs.length?', and '+heirs.length+' to carry it on.':'.'}</p>
      <div id="heirpick"></div>
    </div>
  </div>`;
  const hp=$('#heirpick');
  if(heirs.length){
    hp.insertAdjacentHTML('beforeend',`<p style="margin-top:12px;color:var(--ink-dim)">Take up the thread as…</p><div class="choosecards" id="hc"></div>`);
    const inherit = Math.floor(estate/heirs.length);
    heirs.forEach(h=>{
      const c=document.createElement('button'); c.className='ccard';
      c.innerHTML=`<b>${h.first} ${h.last} · ${h.age}</b><span>${sexWord(h.sex)} · ${h.job!=='none'?CAREER(h.job).l:(h.inSchool?h.schoolLevel:'finding their way')} · inherits ${money(inherit)}</span>`;
      c.onclick=()=>{ h.money+=inherit; switchTo(h); };
      $('#hc').appendChild(c);
    });
  } else {
    hp.insertAdjacentHTML('beforeend',`<p style="margin-top:14px;color:var(--ink-dim)">The bloodline ends here. No heirs survive.</p>
    <button class="btn gold" id="ng">Begin a New Bloodline</button>`);
    $('#ng').onclick=()=>{ wipe(); creator(); };
  }
}
function switchTo(h){
  G.cur=h.id; G.gen=h.gen;
  _logShownFor=null; // force a fresh log for the new character
  log(`The thread passes to ${h.first}. ${pick(['A new chapter.','Life goes on.','The story continues.'])}`,'big');
  render(); root.innerHTML='';
}

let _nid=-100;
function nid(){ return _nid--; }

function relTick(p){
  // bond drift + kin mortality
  p.rels.forEach(r=>{
    if(!r.alive) return;
    r.bond = clamp(r.bond + rndDrift(2));
    // parents/elders age out
    if((r.kind==='Mother'||r.kind==='Father') && chance(p.age>40?9:1.2)){ r.alive=false; log(`${p.first}'s ${r.kind.toLowerCase()} passed away.`,'death'); p.stats.happy=clamp(p.stats.happy-12);}
    else if(chance(0.5+ (p.age>60?2:0))){ r.alive=false; if(r.kind==='Spouse'){p.married=false;recordPartner(p,r,'Late spouse');log(`${r.name.split(' ')[0]} passed away. ${p.first} is a widow${p.sex==='m'?'er':''} now.`,'death');p.stats.happy=clamp(p.stats.happy-20);} }
  });
  // spouse can drift to divorce
  if(p.married && chance(3)){
    const sp=p.rels.find(r=>r.kind==='Spouse'&&r.alive);
    if(sp && sp.bond<35){ p.married=false; sp.kind='Ex-spouse'; recordPartner(p,sp,'Ex-spouse'); log(`${p.first} and ${sp.name.split(' ')[0]} divorced.`,'bad'); p.money-=Math.floor(p.money*0.3); p.stats.happy=clamp(p.stats.happy-15); }
  }
}

  const rels=[...p.rels].sort((a,b)=>(order[a.kind]??9)-(order[b.kind]??9));
  if(!rels.length) html+=`<p class="hint">No one close right now.</p>`;
  rels.forEach((r,i)=>{
    const col=r.bond>66?'--sage':r.bond>33?'--gold':'--blood';
    const emoji=relEmoji(r);
    const isRomantic = (r.kind==='Spouse'||r.kind==='Partner') && r.alive;
    html+=`<div class="rel ${r.alive?'':'dead'}">
      <div class="av">${emoji}</div>
      <div class="rinfo"><div class="rn">${r.name}</div><div class="rd">${r.kind}${r.note?' · '+r.note:''}${r.alive?'':' · passed'}</div>

      ${isRomantic?`<button class="act" style="width:auto;padding:8px 10px;font-size:11px" data-i="${i}" data-act="leave">${r.kind==='Spouse'?'Divorce':'Break<br>up'}</button>`:''}
    </div>`;
  });
  // action footer
  html+=`<div style="padding:14px 20px 0">`;
  if(!p.married && p.age>=18){

    if(hasPartner) html+=`<button class="btn gold" data-do="marry">💍 Propose to ${hasPartner.name.split(' ')[0]}</button>`;
    else html+=`<button class="btn ghost" data-do="date">💘 Look for love</button>`;
  }
  const hasMate=p.married||p.rels.find(r=>r.kind==='Partner'&&r.alive);
  if(hasMate && p.age>=18){
    // natural conception caps at 47; fertility clinic extends to 55
    if(p.age<=47){
      html+=`<button class="btn ghost" data-do="baby" style="margin-top:8px">🍼 Try for a child</button>`;
    } else if(p.age<=55){
      html+=`<button class="btn ghost" data-do="ivf" style="margin-top:8px">🏥 Fertility clinic ($28,000)</button>`;
    }
  }
  // adoption available at any adult age, with or without a partner
  if(p.age>=21){
    html+=`<button class="btn ghost" data-do="adopt" style="margin-top:8px">🤱 Adopt a child ($18,000)</button>`;
  }
  // casual fling — single, can lead to a child out of wedlock
  if(p.age>=18 && !p.married){
    html+=`<button class="btn ghost" data-do="fling" style="margin-top:8px">🔥 Casual fling</button>`;
  }
  // partner history
  if(p.partnerHistory && p.partnerHistory.length){
    html+=`<button class="btn ghost" data-do="history" style="margin-top:8px">📜 Past loves (${p.partnerHistory.length})</button>`;
  }
  html+=`</div>`;
  sheet(html, sh=>{
    sh.querySelectorAll('[data-act="time"]').forEach(b=>b.onclick=()=>{
      const r=rels[+b.dataset.i]; r.bond=clamp(r.bond+8+rnd(8)); p.stats.happy=clamp(p.stats.happy+3);
      closeSheet(); log(`${p.first} spent time with ${r.name.split(' ')[0]}. They grew closer.`,'good'); render();
    });
    sh.querySelectorAll('[data-act="leave"]').forEach(b=>b.onclick=()=>{
      const r=rels[+b.dataset.i]; doBreakup(p, r);
    });
    const marry=sh.querySelector('[data-do="marry"]'); if(marry)marry.onclick=()=>doMarry(p);
    const date=sh.querySelector('[data-do="date"]'); if(date)date.onclick=()=>doDate(p);
    const baby=sh.querySelector('[data-do="baby"]'); if(baby)baby.onclick=()=>doBaby(p,false);
    const ivf=sh.querySelector('[data-do="ivf"]'); if(ivf)ivf.onclick=()=>doBaby(p,true);
    const adopt=sh.querySelector('[data-do="adopt"]'); if(adopt)adopt.onclick=()=>doAdopt(p);
    const fling=sh.querySelector('[data-do="fling"]'); if(fling)fling.onclick=()=>doFling(p);
    const hist=sh.querySelector('[data-do="history"]'); if(hist)hist.onclick=()=>openPartnerHistory(p);
  });
}

function doBreakup(p, r){
  closeSheet();
  if(r.kind==='Spouse'){
    p.married=false; r.kind='Ex-spouse'; recordPartner(p,r,'Ex-spouse');
    const split=Math.floor(p.money*(0.25+Math.random()*0.2));
    p.money-=split;
    p.stats.happy=clamp(p.stats.happy-12);
    log(`${p.first} divorced ${r.name.split(' ')[0]}. The split cost ${money(split)}.`,'bad');
  } else {
    // partner breakup
    r.kind='Ex'; r.alive=true;
    // remove ex partners from the active list after a moment — keep as a faded entry
    p.rels = p.rels.filter(x=>x!==r);
    p.stats.happy=clamp(p.stats.happy-6);
    log(`${p.first} broke up with ${r.name.split(' ')[0]}.`,'muted');
  }
  render();
}
function doFling(p){
  closeSheet();
  const sx=partnerSex(p); const otherName=newFirst(sx)+' '+pick(LAST);
  p.stats.happy=clamp(p.stats.happy+6);
  // chance of a child depends on age, lower than a committed couple
  const fertile = p.age<=47;
  if(fertile && chance(p.age<35?22:p.age<42?12:5)){
    const child=makeChild(p,{fling:true, otherParent:otherName});
    p.partnerHistory.push({id:nid(), name:otherName, sex:sx, from:G.year, to:G.year, status:'Fling', kids:1});
    log(`${p.first} had a fling with ${otherName.split(' ')[0]} — and months later, a surprise: a child, ${child.first}.`,'birth');
  } else {
    p.partnerHistory.push({id:nid(), name:otherName, sex:sx, from:G.year, to:G.year, status:'Fling', kids:0});
    log(`${p.first} had a brief fling with ${otherName.split(' ')[0]}. No strings.`,'good');
  }
  render();
}

function openPartnerHistory(p){
  closeSheet();
  let html=`<div class="grab"></div><h3>${p.first}'s past loves</h3><p class="hint">Everyone who left a mark.</p>`;
  const icon={'Spouse':'❤️','Partner':'💕','Ex-spouse':'💔','Late spouse':'🕯','Fling':'🔥'};
  // include current spouse/partner from rels too
  const current=p.rels.filter(r=>(r.kind==='Spouse'||r.kind==='Partner')&&r.alive);
  current.forEach(r=>{
    html+=`<div class="rel"><div class="av">${icon[r.kind]||'💕'}</div>
      <div class="rinfo"><div class="rn">${r.name}</div><div class="rd">${r.kind==='Spouse'?'Married — current':'Together now'}</div></div></div>`;
  });
  [...p.partnerHistory].reverse().forEach(h=>{
    const span = h.to&&h.to!==h.from ? `${h.from}–${h.to}` : `${h.from}`;
    const kidStr = h.kids? ` · ${h.kids} child${h.kids>1?'ren':''}` : '';
    html+=`<div class="rel"><div class="av">${icon[h.status]||'💔'}</div>
      <div class="rinfo"><div class="rn">${h.name}</div><div class="rd">${h.status} · ${span}${kidStr}</div></div></div>`;
  });
  if(!current.length && !p.partnerHistory.length) html+=`<p class="hint">No history yet.</p>`;
  sheet(html);
}
function relEmoji(r){
  if(r.kind==='Spouse'||r.kind==='Partner')return '❤️';
  if(r.kind==='Child')return r.sex==='m'?'👦':r.sex==='f'?'👧':'🧒';
  if(r.kind==='Mother')return '👩';
  if(r.kind==='Father')return '👨';
  if(r.kind==='Ex-spouse')return '💔';
  if(/Sister|Brother|Sibling/.test(r.kind))return '🧑';
  return '🙂';
}

function doDate(p){
  closeSheet();
  if(p.stats.looks+p.stats.happy < 40 && chance(50)){ log(`${p.first} tried to meet someone. It didn't click this time.`,'muted'); render(); return; }
  const sx=partnerSex(p); const partner={name:newFirst(sx)+' '+pick(LAST),kind:'Partner',sex:sx,bond:45+rnd(30),alive:true,id:nid()};
  p.rels.push(partner); p.stats.happy=clamp(p.stats.happy+8);
  log(`${p.first} started seeing ${partner.name.split(' ')[0]}.`,'good'); render();
}
function recordPartner(p, rel, status, kids){
  // find existing history entry for this rel id, or create one
  let h=p.partnerHistory.find(x=>x.id===rel.id);
  if(!h){ h={id:rel.id, name:rel.name, sex:rel.sex, from:G.year, to:null, status, kids:kids||0}; p.partnerHistory.push(h); }
  else { h.status=status; if(status!=='Spouse'&&status!=='Partner') h.to=G.year; if(kids!=null) h.kids=kids; }
  return h;
}
function doMarry(p){
  closeSheet();
  const partner=p.rels.find(r=>r.kind==='Partner'&&r.alive);
  if(!partner)return;
  if(partner.bond<40 && chance(60)){ log(`${p.first} proposed. ${partner.name.split(' ')[0]} said no.`,'bad'); partner.bond=clamp(partner.bond-15); render(); return; }
  partner.kind='Spouse'; partner.bond=clamp(partner.bond+15); p.married=true; p.partnerName=partner.name;
  recordPartner(p, partner, 'Spouse');
  const cost=4000+rnd(20000); p.money-=Math.min(p.money,cost);
  p.stats.happy=clamp(p.stats.happy+14);
  log(`${p.first} married ${partner.name.split(' ')[0]}. A good day.`,'big'); render();
}
function makeChild(p, opts={}){
  const csx=makeSex();
  const child=blankPerson({ first:newFirst(csx), last:p.last, sex:csx, gen:p.gen+1, born:G.year, age:opts.age||0, parentIds:[p.id] });
  if(opts.adopted){
    child.stats.smarts=clamp(45+rnd(45));
    child.stats.looks=clamp(40+rnd(45));
  } else {
    child.stats.smarts=clamp((p.stats.smarts+(50+rnd(30)))/2);
    child.stats.looks=clamp((p.stats.looks+(40+rnd(40)))/2);
    if(p.traits.length) child.traits=[pick(p.traits), pick(TRAITS).k].filter((v,i,a)=>a.indexOf(v)===i);
  }
  child.adopted=!!opts.adopted;
  child.fromFling=!!opts.fling;
  if(opts.otherParent) child.otherParent=opts.otherParent;
  G.people.push(child);
  p.childrenIds.push(child.id);
  const kindLabel = opts.fling ? 'Child (out of wedlock)' : 'Child';
  p.rels.push({name:child.first+' '+child.last,kind:'Child',sex:csx,bond:opts.adopted?70:opts.fling?60:80,alive:true,id:child.id, note:opts.fling?'born from a fling':null});
  return child;
}
function doBaby(p, ivf){
  closeSheet();
  const sp=p.rels.find(r=>(r.kind==='Spouse'||r.kind==='Partner')&&r.alive);
  if(!sp){ log(`${p.first} needs a partner first.`,'muted'); render(); return; }
  if(ivf){
    if(p.money<28000){ log(`${p.first} can't afford the fertility clinic.`,'muted'); render(); return; }
    p.money-=28000;
    if(chance(45)){ log(`The IVF cycle didn't take this time. Heartbreaking, and expensive.`,'bad'); render(); return; }
  } else {
    // conception odds fall with age
    const odds = p.age<35?72:p.age<40?52:p.age<45?32:18;
    if(!chance(odds)){ log(`They tried for a child. Not this year.`,'muted'); render(); return; }
  }
  const child=makeChild(p,{});
  p.stats.happy=clamp(p.stats.happy+10);
  log(`A child was born — ${child.first} ${child.last}.`,'birth'); render();
}
function doAdopt(p){
  closeSheet();
  if(p.money<18000){ log(`${p.first} can't cover the adoption costs right now.`,'muted'); render(); return; }
  p.money-=18000;
  if(chance(20)){ log(`The adoption fell through after months of waiting. The fee was refunded.`,'bad'); p.money+=18000; render(); return; }
  // adopted children can arrive at any age 0-10
  const child=makeChild(p,{adopted:true, age:rnd(11)});
  p.stats.happy=clamp(p.stats.happy+12);
  log(`${p.first} adopted ${child.first}${child.age>0?`, age ${child.age}`:''}. A family, chosen.`,'birth'); render();
}

function openActivities(){
  const p=me();
  let html=`<div class="grab"></div><h3>What will ${p.first} do?</h3><p class="hint">Age ${p.age} · ${money(p.money)} in purse</p>`;

  // CORE FREE-TIME — always pinned to the very top (most-used actions)

    opts.push(OH('— Free time —'));

    opts.push(O('📕','Study something','+smarts',0,()=>{p.stats.smarts=clamp(p.stats.smarts+5);closeSheet();log(`${p.first} read late into the night. Sharper for it.`,'good');render();}));

    opts.push(O('🧘','Rest & reflect','+health, +joy',0,()=>{p.stats.health=clamp(p.stats.health+3);p.stats.happy=clamp(p.stats.happy+4);closeSheet();log(`A slow, restful stretch did ${p.first} good.`,'good');render();}));
  }

  // EDUCATION
  if(p.age>=18 && p.edu<3 && !p._college){
    if(p.edu<1) opts.push(O('🛠','Trade school / academy','2 years · opens skilled work',-6000,()=>enrollCollege(p,1,2)));
    if(p.edu<2 && p.stats.smarts>=45) opts.push(O('🎓','University','4 years · earn a degree',-30000,()=>enrollCollege(p,2,4)));
    if(p.edu>=2 && p.stats.smarts>=65) opts.push(O('📚','Graduate school','4 years · become a doctor/lawyer',-45000,()=>enrollCollege(p,3,4)));
    if(p.stats.smarts<45 && p.edu<2) opts.push(O('🚫','University','smarts too low to enroll',0,null,true));
  }
  if(p._college){ opts.push(O('📖','In school',`${p._college} year(s) of ${EDU[p._collegeTier]} left`,0,null,true)); }

  // HIGH-SCHOOL CLUBS (ages 13-18, in school)
  if(p.age>=13 && p.age<=18 && p.inSchool){
    opts.push(OH('— School clubs —'));
    CLUBS.forEach(cl=>{
      const joined=p.clubs.includes(cl.k);
      const helpsCareer=CAREER(cl.helps);
      opts.push(O(cl.emoji, cl.l, joined?'✓ member · building '+cl.blurb:`+${cl.stat} yearly · helps future ${helpsCareer?helpsCareer.l:cl.helps}`,0,()=>{
        if(joined){ p.clubs=p.clubs.filter(x=>x!==cl.k); closeSheet(); log(`${p.first} quit ${cl.l}.`,'muted'); render(); }
        else { p.clubs.push(cl.k); p.stats[cl.stat]=clamp(p.stats[cl.stat]+cl.boost); setFlag(p,cl.flag); closeSheet(); log(`${p.first} joined ${cl.l}.`,'good'); render(); }
      }));
    });
  }

  // PART-TIME (teens 13-17, or students)
  if((p.age>=13 && p.age<18) || p._college){
    if(!p.partTime){
      opts.push(OH('— Part-time gig —'));
      [['🍔','Fast food',9000],['🛒','Grocery bagger',8000],['📰','Paper route',5000],['🐕','Dog walker',6000],['💻','Online freelance',12000]].forEach(([ic,nm,pay])=>{
        opts.push(O(ic,nm,`~${money(pay)}/yr · builds savings`,0,()=>{p.partTime={name:nm,pay};closeSheet();log(`${p.first} picked up work as a ${nm.toLowerCase()}.`,'good');render();}));
      });
    } else {
      opts.push(O('🧺','Quit part-time job',p.partTime.name,0,()=>{closeSheet();log(`${p.first} quit the ${p.partTime.name.toLowerCase()} job.`,'muted');p.partTime=null;render();}));
    }
  }

  // WORK
  if(p.age>=18){
    if(p.job==='none'){
      opts.push(OH('— Find a career —'));
      CAREERS.filter(c=>c.k!=='none').forEach(c=>{
        const eduGate = p.edu < c.edu;

        const looksGate = c.looksGate && p.stats.looks < c.looksGate;

        let sub;
        if(athGate) sub='needs athleticism '+(c.athGate||80)+'+';

      });
    } else {
