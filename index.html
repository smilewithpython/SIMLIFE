    {kind:'rental',    e:'🏢', name:'Rental Property',    cost:140000, income:14000, blurb:'passive rent'},
    {kind:'gym',       e:'🏋', name:'Gym Franchise',      cost:170000, income:30000, blurb:'memberships add up'},
    {kind:'carwash',   e:'🚗', name:'Car Wash Chain',     cost:210000, income:36000, blurb:'rain or shine'},
    {kind:'casino',    e:'🎰', name:'Online Casino',      cost:250000, income:60000, blurb:'big, risky income'},
    {kind:'brewery',   e:'🍺', name:'Craft Brewery',      cost:300000, income:48000, blurb:'trendy margins'},
    {kind:'hotel',     e:'🏨', name:'Boutique Hotel',     cost:600000, income:95000, blurb:'prestige and profit'},
    {kind:'techco',    e:'💻', name:'Tech Startup',       cost:500000, income:120000,blurb:'high risk, high reward'},
    {kind:'vineyard',  e:'🍷', name:'Vineyard',           cost:850000, income:110000,blurb:'old-money income'},
    {kind:'sportsteam',e:'🏟', name:'Pro Sports Team',    cost:5000000,income:700000,blurb:'a billionaire\'s toy'},

        p.money-=b.cost; p.businesses.push({kind:b.kind,name:b.name,value:b.cost,income:b.income}); closeSheet();

  (p.businesses||[]).forEach((b,i)=>{
    opts.push(O('💼',`Sell ${b.name}`,`worth ${money(b.value)}`,0,()=>{
      p.money+=b.value; p.businesses.splice(i,1); closeSheet();
      log(`${p.first} sold ${b.name} for ${money(b.value)}.`,'good'); render();
    }));
  });

  // LUXURY
  opts.push(OH('— Luxury & lifestyle —'));
  [['🏝','Private island','luxury',2500000],['🛥','Yacht','luxury',900000],['🚁','Helicopter','luxury',1200000],
   ['🏎','Supercar','car',300000],['🚐','Luxury RV','luxury',180000],['💎','Fine jewelry','luxury',60000],
   ['🎨','Art collection','luxury',450000],['⌚','Luxury watch collection','luxury',120000],['🐎','Racehorse','luxury',350000],
   ['✈️','Private jet','luxury',8000000],['🏰','Countryside estate','luxury',3500000],['🏍','Custom motorcycle','car',90000]].forEach(([ic,nm,kind,price])=>{
    opts.push(O(ic,nm,p.money>=price?`${money(price)} · +joy, status`:`needs ${money(price)}`,0,()=>{

    }, p.money<price));

  sheet(html+opts.join(''), sh=>{

    });
    sh.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.sell; const amt=p.portfolio[k]; p.money+=amt; p.portfolio[k]=0; closeSheet();
      log(`${p.first} cashed out ${money(amt)} from ${k} risk holdings.`,'good'); render();
    });
  });
}

function openHealth(){
  const p=me();
  const prem = 2200 + p.age*40 + p.conditions.length*900;
  let html=`<div class="grab"></div><h3>${p.first}'s health</h3>
  <p class="hint">Health ${Math.round(p.stats.health)} · Stress ${Math.round(p.stress)} · ${p.insured?'✅ Insured':'⚠️ No insurance'}${p.conditions.length?' · '+p.conditions.join(', '):''}</p>`;
  const opts=[];

  // insurance
  if(!p.insured){
    opts.push(O('🛡','Buy health insurance',`${money(prem)}/yr · covers most medical bills`,0,()=>{
      p.insured=true; p.insurePremium=prem; closeSheet();
      log(`${p.first} signed up for health insurance — ${money(prem)}/yr.`,'good'); render();
    }, p.money<prem));
  } else {
    opts.push(O('🛡','Cancel insurance',`stop paying ${money(p.insurePremium)}/yr`,0,()=>{
      p.insured=false; closeSheet(); log(`${p.first} dropped health insurance. Risky.`,'muted'); render();
    }));
  }

  // doctor
  if(p.age>=1){
    const cost = p.insured? 200 : 1500+rnd(2000);
    opts.push(O('🩺','See a doctor',`+health · ${money(cost)}${p.insured?' (insured rate)':''}`,0,()=>{
      p.money-=cost; p.stats.health=clamp(p.stats.health+12+rnd(8));
      if(p.conditions.length && chance(40)){const cured=p.conditions.shift();log(`Treatment cleared up ${p.first}'s ${cured}.`,'big');}
      else log(`${p.first} got a checkup and a clean tune-up.`,'good');
      closeSheet(); render();
    }, p.money<cost));
  }

  // pregnancy care
  if(p.pregnant){
    opts.push(OH('— Expecting —'));
    opts.push(O('🤰','Pregnancy & prenatal care','prenatal care or other options',0,()=>{ closeSheet(); openPrenatalOptions(p); }));
  }

  // therapy / stress
  opts.push(O('🛋','Go to therapy','−stress, +joy · $1,200',0,()=>{
    p.money-=Math.min(p.money,1200); p.stress=clamp(p.stress-25); p.stats.happy=clamp(p.stats.happy+8);
    closeSheet(); log(`${p.first} started therapy. The weight lifted a little.`,'good'); render();
  }));

  // rehab — one option per active addiction
  if(p.addictions && p.addictions.length){
    opts.push(OH('— Recovery —'));
    p.addictions.forEach(a=>{ const d=ADDICT(a.k); if(!d) return;
      const cost = {alcohol:8000,cocaine:15000,party_drugs:12000,painkillers:18000,gambling:10000,nicotine:5000}[a.k]||8000;
      opts.push(O(d.e,`Rehab for ${d.l}`,`${d.rehab}${a.sev>1?' · severe':''}`,0,()=>{
        if(p.money<cost){closeSheet();log(`${p.first} can't afford this program right now.`,'muted');render();return;}
        p.money-=cost; closeSheet();
        const odds = 75 - (a.sev-1)*18;
        if(chance(odds)){ clearAddiction(p,a.k); p.stats.health=clamp(p.stats.health+10); p.stats.happy=clamp(p.stats.happy+12); log(`${p.first} came out of rehab clean of ${d.l}. A new start.`,'big'); }
        else { if(a.sev>1)a.sev--; log(`Rehab didn't fully take, but ${p.first} is fighting it.`,'bad'); }
        render();
      }));
    });
  }

  // plastic surgery
  if(p.age>=18){
    opts.push(O('💅','Cosmetic surgery','+looks · $12,000 · some risk',0,()=>{
      p.money-=Math.min(p.money,12000); closeSheet();
      if(chance(80)){p.stats.looks=clamp(p.stats.looks+12);log(`The surgery went well. ${p.first} loves the result.`,'good');}
      else{p.stats.looks=clamp(p.stats.looks-8);p.stats.health=clamp(p.stats.health-6);log(`The surgery was botched. ${p.first} regrets it.`,'bad');}
      render();
    }));
  }

  // meditate (free)
  opts.push(O('🧘','Meditate','−stress, free',0,()=>{
    p.stress=clamp(p.stress-12); p.stats.happy=clamp(p.stats.happy+3); closeSheet();
    log(`${p.first} sat with their breath a while. Calmer.`,'good'); render();
  }));

  // ----- TRAITS: psychologist removes a bad trait; specialist coaching adds a good one -----
  const badTraits=(p.acqTraits||[]).filter(k=>{const t=ACQ(k);return t&&!t.good;});
  if(badTraits.length){
    opts.push(OH('— Traits —'));
    badTraits.forEach(k=>{ const t=ACQ(k); const cost=8000;
      opts.push(O('🧠',`See a psychologist about "${t.l}"`,`work to overcome it · ${money(cost)}`,0,()=>{
        if(p.money<cost){closeSheet();log(`${p.first} can't afford the sessions right now.`,'muted');render();return;}
        p.money-=cost; closeSheet();
        if(chance(65)){ removeTrait(p,k); log(`After months of work, ${p.first} overcame being ${t.l.toLowerCase()}.`,'big'); }
        else log(`The sessions helped a little, but ${p.first} is still working through it.`,'muted');
        render();
      }));
    });
  }
  if(p.age>=12){
    const goodAvailable=ACQ_TRAITS.filter(t=>t.good&&!hasTrait(p,t.k));
    if(goodAvailable.length){
      const cost=15000;
      opts.push(OH(badTraits.length?'':'— Traits —'));
      opts.push(O('🌟','Hire a personal coach','train toward a positive trait · $15,000',0,()=>{
        if(p.money<cost){closeSheet();log(`${p.first} can't afford a coach right now.`,'muted');render();return;}
        p.money-=cost; closeSheet();
        if(chance(50)){ const t=pick(goodAvailable); addTrait(p,t.k); }
        else log(`${p.first} worked hard with the coach, but nothing quite clicked this time.`,'muted');
        render();
      }));
    }
  }

  sheet(html+opts.join(''), sh=>bindOpts(sh));
}

function openHistory(p){
  closeSheet();
  let html=`<div class="grab"></div><h3>${p.first}'s life so far</h3><p class="hint">Everything that's happened, year by year.</p>`;
  const log=p.log||[];
  if(!log.length){ html+=`<p class="hint">Nothing recorded yet.</p>`; sheet(html); return; }
  // group by age, then show season-tagged entries within
  const byAge={};
  log.forEach(e=>{ const a=(e.age!=null?e.age:0); (byAge[a]=byAge[a]||[]).push(e); });
  const ages=Object.keys(byAge).map(Number).sort((a,b)=>b-a); // newest first
  html+=`<div style="padding:0 18px 8px">`;
  ages.forEach(a=>{
    html+=`<div style="font-variant:small-caps;letter-spacing:2px;color:var(--gold);font-size:13px;margin:14px 0 8px;border-bottom:1px solid rgba(217,164,65,.18);padding-bottom:5px">Age ${a}</div>`;
    byAge[a].forEach(e=>{
      const kindCol = e.k==='bad'||e.k==='death'?'var(--blood)':e.k==='big'||e.k==='birth'?'var(--gold)':'var(--ink)';
      const season = e.q!=null && SEASONS[e.q] ? `<span style="color:var(--ink-faint);font-size:10.5px">${SEASONS[e.q].slice(0,3)} · </span>`:'';
      html+=`<div style="font-size:13.5px;line-height:1.5;margin-bottom:7px;color:${kindCol}">${season}${e.t}</div>`;
    });
  });
  html+=`</div>`;
  sheet(html);
}

function openRename(p){
  closeSheet();
  root.innerHTML=`

  </div>`;
  $('#rsave').onclick=()=>{
    const nf=($('#rf').value||'').trim()||p.first, nl=($('#rl').value||'').trim()||p.last;
    p.first=nf; p.last=nl; root.innerHTML=''; log(`Name changed to ${nf} ${nl}.`,'muted'); render();
  };
  $('#rcancel').onclick=()=>{ root.innerHTML=''; };
}
// Rename a relationship entry (partner, child, friend, sibling). Updates the linked person if any.
function openRenameRel(p, r){
  closeSheet();
  const parts=(r.name||'').split(' ');
  const cf=parts[0]||'', cl=parts.slice(1).join(' ')||'';
  root.innerHTML=`
  <div class="scrim center">
    <div class="cmodal">
      <h2>Rename ${r.kind.toLowerCase()}</h2>
      <p>Edit how this person is named in ${p.first}'s life.</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="txt" id="nf" value="${cf}" placeholder="First" style="margin-top:0">
        <input class="txt" id="nl" value="${cl}" placeholder="Last" style="margin-top:0">
      </div>
      <button class="btn gold" id="nsave">Save</button>
      <button class="btn ghost" id="ncancel">Cancel</button>
    </div>
  </div>`;
  $('#nsave').onclick=()=>{
    const nf=($('#nf').value||'').trim()||cf, nl=($('#nl').value||'').trim()||cl;
    const full=(nf+' '+nl).trim();
    r.name=full;
    // if this relationship links to a real person in the world, update them too
    if(r.id!=null){ const linked=findP(G,r.id); if(linked){ linked.first=nf; if(nl)linked.last=nl; } }
    root.innerHTML=''; render();
  };
  $('#ncancel').onclick=()=>{ root.innerHTML=''; render(); };
}
// When a child is born, let the player name them and pick a surname.
function openNameChild(parent, child, otherLast, cb){
  const sx=child.sex;
  const partnerLast = otherLast && otherLast!==parent.last ? otherLast : null;
  root.innerHTML=`
  <div class="scrim center">
    <div class="cmodal">
      <div style="text-align:center;font-size:38px;margin-bottom:4px">${sx==='f'?'👶':'👶'}</div>
      <h2 style="text-align:center">A child is born</h2>
      <p style="text-align:center">Name ${parent.first}'s ${sx==='f'?'daughter':'son'}.</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="txt" id="cf" value="${child.first}" placeholder="First name" style="margin-top:0">
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--ink-dim)">Surname</div>
      <div id="lastpick" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
        <button class="btn ghost lastopt sel" data-l="${parent.last}" style="margin-top:0;flex:1;border-color:var(--gold)">${parent.last}<br><span style="font-size:10px;color:var(--ink-dim)">your name</span></button>
        ${partnerLast?`<button class="btn ghost lastopt" data-l="${partnerLast}" style="margin-top:0;flex:1">${partnerLast}<br><span style="font-size:10px;color:var(--ink-dim)">partner's name</span></button>`:''}
        ${partnerLast?`<button class="btn ghost lastopt" data-l="${parent.last}-${partnerLast}" style="margin-top:0;flex:1">${parent.last}-${partnerLast}<br><span style="font-size:10px;color:var(--ink-dim)">hyphenated</span></button>`:''}
      </div>
      <button class="btn gold" id="cdone" style="margin-top:12px">Welcome them</button>
    </div>
  </div>`;
  let chosenLast=parent.last;
  root.querySelectorAll('.lastopt').forEach(b=>{ b.onclick=()=>{ chosenLast=b.dataset.l; root.querySelectorAll('.lastopt').forEach(x=>{x.classList.remove('sel');x.style.borderColor='var(--line)';}); b.classList.add('sel'); b.style.borderColor='var(--gold)'; }; });
  $('#cdone').onclick=()=>{
    const nf=($('#cf').value||'').trim()||child.first;
    child.first=nf; child.last=chosenLast;
    // update the relationship entry on the parent
    const rel=parent.rels.find(r=>r.id===child.id); if(rel) rel.name=child.first+' '+child.last;
    root.innerHTML='';
    if(cb)cb();
    render();
  };
}

/* ============================================================
   FAMILY TREE
   ============================================================ */
function openTree(){
  // build generations from people array (biological line)
  const byGen={};
  G.people.forEach(p=>{ (byGen[p.gen]=byGen[p.gen]||[]).push(p); });
  const gens=Object.keys(byGen).map(Number).sort((a,b)=>a-b);
  let html=`<div class="grab"></div><h3>The ${G.lineage} line</h3><p class="hint">Every life lived in this bloodline. ★ marks who you are now.</p><div id="tree">`;
  gens.forEach(g=>{
    html+=`<div class="gen"><span class="gen-lab">Gen ${g}</span>`;
    byGen[g].forEach(p=>{
      const isYou=p.id===G.cur;
      const f= p.sex==='m'?'👨':p.sex==='f'?'👩':'🧑';
      const yrs = p.alive? `b. ${p.born}` : `${p.born}–${p.born+(p.deathAge||p.age)}`;
      html+=`<div class="node ${isYou?'you':''} ${p.alive?'':'dead'}">
        <div class="nf">${p.alive?f:'🕯'}</div>
        <div class="nn">${p.first}<br>${p.last}</div>
        <div class="ny">${yrs}${isYou?' ★':''}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  sheet(html);
}

/* ============================================================
   SHEET / OPTION HELPERS
   ============================================================ */
function O(ico,txt,sub,cost,fn,disabled=false){
  const id='o'+Math.random().toString(36).slice(2);
  window.__opts=window.__opts||{}; window.__opts[id]={fn,disabled};
  return `<button class="opt" data-id="${id}" ${disabled?'disabled':''}>
    <span class="oico">${ico}</span>
    <span class="otxt">${txt}<span class="osub">${sub}</span></span>
    ${cost?`<span class="ocost">${money(cost)}</span>`:''}</button>`;
}
function OH(label){ return `<div style="padding:14px 20px 4px;font-size:12px;color:var(--ink-faint);font-variant:small-caps;letter-spacing:1.5px">${label}</div>`; }
function bindOpts(sh){
  sh.querySelectorAll('.opt').forEach(b=>{
    const o=window.__opts[b.dataset.id];
    if(o && o.fn && !o.disabled) b.onclick=o.fn;
  });
}
function sheet(html, after){
  const s=document.createElement('div'); s.className='scrim';
  s.innerHTML=`<div class="sheet">${html}</div>`;
  root.appendChild(s);
  s.onclick=e=>{ if(e.target===s) closeSheet(); };
  if(after) after(s.querySelector('.sheet'));
}
function closeSheet(){ const s=root.querySelector('.scrim'); if(s)s.remove(); }

function toast(t){ const el=document.createElement('div'); el.className='toast'; el.textContent=t; document.body.appendChild(el); setTimeout(()=>el.remove(),1800); }

/* ============================================================
   GO
   ============================================================ */
window.addEventListener('load',()=>{ bootScreen(); });
// safety: re-render if returning
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && G && me()) render(); });
</script>
